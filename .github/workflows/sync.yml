name: Daily OptiSigns Sync

on:
  schedule:
    # Chạy tự động vào 02:00 sáng mỗi ngày (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Cho phép bấm nút chạy bằng tay trên GitHub giao diện

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          
      - name: Run Automation Pipeline
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd scraper
          python main.py
          
      - name: Commit and Push Delta DB & Markdown
        # Bước này lưu lại trạng thái (các file .md, delta.db) lên Github
        # để lần chạy ngày mai tool biết bài nào đã lấy, bài nào chưa.
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add scraper/data/ scraper/articles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update articles and delta db [skip ci]" && git push)
