name: Daily OptiSigns Sync

on:
  schedule:
    # Chạy tự động vào 02:00 sáng mỗi ngày (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Cho phép bấm nút chạy bằng tay trên GitHub giao diện

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          
      - name: Run Automation Pipeline
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd scraper
          python main.py
          
      - name: Commit and Push Delta DB & Markdown
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f scraper/data/ scraper/articles/ || true
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto-update articles and delta db [skip ci]"
            git push
          else
            echo "No changes to commit. Everything is up to date!"
          fi
